<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <dir>.</dir>
  <cachedir>/tmp/font-cache</cachedir>

  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Noto Sans Mono</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>Arial</family>
    <prefer>
      <family>Noto Sans</family>
    </prefer>
  </alias>
  <alias binding="same">
    <family>Helvetica</family>
    <prefer>
      <family>Noto Sans</family>
    </prefer>
  </alias>
  <alias binding="same">
    <family>Helvetica Neue</family>
    <prefer>
      <family>Noto Sans</family>
    </prefer>
  </alias>
  <alias binding="same">
    <family>Bitstream Vera Sans</family>
    <prefer>
      <family>Noto Sans</family>
    </prefer>
  </alias>
  <alias binding="same">
    <family>Liberation Sans</family>
    <prefer>
      <family>Noto Sans</family>
    </prefer>
  </alias>
  <alias binding="same">
    <family>DejaVu Sans</family>
    <prefer>
      <family>Noto Sans</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>Times New Roman</family>
    <prefer>
      <family>Noto Serif</family>
    </prefer>
  </alias>
  <alias binding="same">
    <family>Times</family>
    <prefer>
      <family>Noto Serif</family>
    </prefer>
  </alias>
  <alias binding="same">
    <family>Liberation Serif</family>
    <prefer>
      <family>Noto Serif</family>
    </prefer>
  </alias>
  <alias binding="same">
    <family>DejaVu Serif</family>
    <prefer>
      <family>Noto Serif</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>Courier New</family>
    <prefer>
      <family>Noto Sans Mono</family>
    </prefer>
  </alias>
  <alias binding="same">
    <family>Courier</family>
    <prefer>
      <family>Noto Sans Mono</family>
    </prefer>
  </alias>
  <alias binding="same">
    <family>Liberation Mono</family>
    <prefer>
      <family>Noto Sans Mono</family>
    </prefer>
  </alias>
  <alias binding="same">
    <family>DejaVu Sans Mono</family>
    <prefer>
      <family>Noto Sans Mono</family>
    </prefer>
  </alias>
</fontconfig>
