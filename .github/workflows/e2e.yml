name: E2E Tests

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-web-shard:
    name: E2E Tests (Web ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
      VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Dev server is started automatically by globalSetup.ts

      - name: Run E2E tests (web shard ${{ matrix.shard }}/4)
        run: npx playwright test --project=web-chromium --shard=${{ matrix.shard }}/4

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-web-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-web-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  e2e-web:
    name: E2E Tests (Web)
    runs-on: ubuntu-latest
    needs: e2e-web-shard
    if: ${{ always() && !cancelled() }}
    steps:
      - name: Validate shard results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          echo "$NEEDS_JSON"
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              job: data.get("result")
              for job, data in needs.items()
              if data.get("result") != "success"
          }

          if failed:
              print("Web e2e shard failures detected:", failed)
              sys.exit(1)

          print("All web e2e shards succeeded.")
          PY

  e2e-tauri:
    name: E2E Tests (Tauri Desktop)
    runs-on: macos-latest
    # Keep desktop E2E coverage on PRs while skipping it on direct pushes to main.
    env:
      VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
      VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install tauri-driver
        run: cargo install tauri-driver

      - name: Install OpenSCAD
        run: brew install --cask openscad

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Tauri app (debug)
        run: pnpm tauri:build --debug

      - name: Run E2E tests (Tauri)
        run: TAURI_TEST=1 npx playwright test --project=tauri-desktop

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-tauri
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-tauri
          path: test-results/
          retention-days: 7
