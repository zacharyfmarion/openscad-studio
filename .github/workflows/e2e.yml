name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-web:
    name: E2E Tests (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Dev server is started automatically by globalSetup.ts

      - name: Run E2E tests (web)
        run: npx playwright test --project=web-chromium

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-web
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-web
          path: test-results/
          retention-days: 7

  e2e-tauri:
    name: E2E Tests (Tauri Desktop)
    runs-on: macos-latest
    # Only run on main branch pushes — desktop tests are expensive
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install tauri-driver
        run: cargo install tauri-driver

      - name: Install OpenSCAD
        run: brew install --cask openscad

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Tauri app (debug)
        run: pnpm tauri:build --debug

      - name: Run E2E tests (Tauri)
        run: TAURI_TEST=1 npx playwright test --project=tauri-desktop

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-tauri
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-tauri
          path: test-results/
          retention-days: 7
